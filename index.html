<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab — Game Hub</title>
  <meta name="description" content="Your personal desktop-style new tab page with quick access to games." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0a0a0f;
      --surface: rgba(255, 255, 255, 0.04);
      --surface-hover: rgba(255, 255, 255, 0.08);
      --surface-border: rgba(255, 255, 255, 0.06);
      --text-primary: #f0f0f5;
      --text-secondary: rgba(255, 255, 255, 0.5);
      --text-tertiary: rgba(255, 255, 255, 0.25);
      --accent-1: #7c5cfc;
      --accent-2: #ff6b9d;
      --accent-3: #4ecdc4;
      --accent-4: #ffd93d;
      --taskbar-bg: rgba(20, 20, 30, 0.75);
      --taskbar-border: rgba(255, 255, 255, 0.08);
      --drawer-bg: rgba(18, 18, 28, 0.88);
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 20px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      position: relative;
    }

    /* ── Ambient animated background ──────────────────────── */
    .ambient {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .ambient-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(130px);
      opacity: 0.10;
      will-change: transform;
    }
    .ambient-orb.orb-1 {
      width: 700px; height: 700px;
      background: var(--accent-1);
      top: -250px; left: -150px;
      animation: orbFloat1 22s ease-in-out infinite alternate;
    }
    .ambient-orb.orb-2 {
      width: 550px; height: 550px;
      background: var(--accent-2);
      bottom: -200px; right: -150px;
      animation: orbFloat2 18s ease-in-out infinite alternate;
    }
    .ambient-orb.orb-3 {
      width: 400px; height: 400px;
      background: var(--accent-3);
      top: 40%; left: 55%;
      animation: orbFloat3 25s ease-in-out infinite alternate;
      opacity: 0.06;
    }
    @keyframes orbFloat1 {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(100px, 80px) scale(1.15); }
    }
    @keyframes orbFloat2 {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-80px, -60px) scale(1.12); }
    }
    @keyframes orbFloat3 {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-60px, 40px) scale(1.2); }
    }

    /* Noise grain */
    .ambient::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.4;
    }

    /* Stars */
    .stars-container {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .star {
      position: absolute;
      width: 1.5px; height: 1.5px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      animation: starTwinkle var(--dur) ease-in-out infinite;
      animation-delay: var(--delay);
    }
    @keyframes starTwinkle {
      0%, 100% { opacity: 0.1; transform: scale(1); }
      50% { opacity: 0.75; transform: scale(1.5); }
    }

    /* ── Desktop area ─────────────────────────────────────── */
    .desktop {
      flex: 1;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* ── Clock ─────────────────────────────────────────────── */
    .clock-section {
      text-align: center;
      animation: fadeInUp 0.9s ease both;
      user-select: none;
    }
    .clock-time {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(7rem, 18vw, 13rem);
      font-weight: 300;
      letter-spacing: -0.04em;
      line-height: 1;
      background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.45) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .clock-greeting {
      font-size: 1.35rem;
      font-weight: 400;
      color: var(--text-secondary);
      margin-top: 0.3rem;
      letter-spacing: 0.02em;
    }
    .clock-date {
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--text-tertiary);
      margin-top: 0.35rem;
      letter-spacing: 0.04em;
    }

    /* ── Taskbar ───────────────────────────────────────────── */
    .taskbar {
      position: relative;
      z-index: 10;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.45rem 1rem;
      background: var(--taskbar-bg);
      border-top: 1px solid var(--taskbar-border);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      animation: slideUp 0.6s 0.3s ease both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .taskbar-left {
      position: absolute;
      left: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .start-btn {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 0.45rem 0.7rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .start-btn:hover,
    .start-btn.active {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
    }
    .start-btn.active {
      background: rgba(124, 92, 252, 0.15);
      color: var(--accent-1);
    }
    .start-btn svg {
      width: 16px; height: 16px;
    }

    .taskbar-center {
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .taskbar-icon {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 46px; height: 46px;
      border-radius: var(--radius-sm);
      background: transparent;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      color: var(--text-primary);
    }
    .taskbar-icon:hover {
      background: rgba(255, 255, 255, 0.08);
    }
    .taskbar-icon:active {
      transform: scale(0.9);
      background: rgba(255, 255, 255, 0.12);
    }
    .taskbar-icon .icon-emoji {
      font-size: 1.5rem;
      line-height: 1;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .taskbar-icon:hover .icon-emoji {
      transform: scale(1.15) translateY(-2px);
    }

    .taskbar-icon::after {
      content: '';
      position: absolute;
      bottom: 3px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px; height: 4px;
      border-radius: 50%;
      background: transparent;
      transition: all 0.25s ease;
    }
    .taskbar-icon.pinned::after {
      background: rgba(255, 255, 255, 0.25);
      width: 4px;
    }
    .taskbar-icon:hover::after {
      background: rgba(255, 255, 255, 0.5);
      width: 16px;
      border-radius: 2px;
      height: 3px;
    }

    .taskbar-icon .tooltip {
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: rgba(30, 30, 45, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 0.4rem 0.75rem;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: all 0.2s ease;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.4);
    }
    .taskbar-icon .tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: rgba(30, 30, 45, 0.95);
    }
    .taskbar-icon:hover .tooltip {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .taskbar-divider {
      width: 1px;
      height: 22px;
      background: rgba(255, 255, 255, 0.08);
      margin: 0 0.3rem;
    }

    .taskbar-right {
      position: absolute;
      right: 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .tray-item {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-tertiary);
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .tray-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent-3);
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    .tray-clock {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-align: right;
      line-height: 1.35;
    }

    /* ── App Drawer overlay ───────────────────────────────── */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      z-index: 15;
      background: rgba(0, 0, 0, 0.35);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    .drawer-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    /* ── App Drawer panel ─────────────────────────────────── */
    .drawer {
      position: fixed;
      bottom: 58px; /* above taskbar */
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      z-index: 20;
      width: 580px;
      max-width: calc(100vw - 2rem);
      max-height: calc(100vh - 100px);
      background: var(--drawer-bg);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      box-shadow: 0 -10px 60px rgba(0, 0, 0, 0.5),
                  0 0 0 1px rgba(255, 255, 255, 0.04);
      overflow: hidden;
      display: flex;
      flex-direction: column;

      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 0.3s cubic-bezier(0.16, 1, 0.3, 1),
                  visibility 0.3s ease;
    }
    .drawer.open {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    /* Drawer search area */
    .drawer-search {
      padding: 1.4rem 1.4rem 0.8rem;
    }
    .drawer-search-bar {
      position: relative;
      width: 100%;
    }
    .drawer-search-bar input {
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-md);
      padding: 0.85rem 1.2rem 0.85rem 2.8rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--text-primary);
      outline: none;
      transition: all 0.25s ease;
    }
    .drawer-search-bar input::placeholder {
      color: var(--text-tertiary);
    }
    .drawer-search-bar input:focus {
      border-color: rgba(124, 92, 252, 0.35);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.08);
    }
    .drawer-search-icon {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      width: 16px; height: 16px;
      color: var(--text-tertiary);
      pointer-events: none;
      transition: color 0.25s ease;
    }
    .drawer-search-bar input:focus ~ .drawer-search-icon {
      color: var(--accent-1);
    }

    /* Drawer section labels */
    .drawer-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      padding: 0 1.4rem;
      margin-bottom: 0.6rem;
    }

    /* Drawer apps grid */
    .drawer-apps {
      padding: 0 1.4rem 1.4rem;
      overflow-y: auto;
    }
    .drawer-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.6rem;
    }

    .drawer-app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      padding: 1.3rem 0.8rem;
      border-radius: var(--radius-md);
      background: transparent;
      border: 1px solid transparent;
      text-decoration: none;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .drawer-app::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .drawer-app:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.06);
    }
    .drawer-app:active {
      transform: scale(0.96);
    }

    /* Per-game gradient overlays on hover */
    .drawer-app[data-game="soccer"]::before {
      background: linear-gradient(145deg, rgba(255, 107, 107, 0.1), transparent);
    }
    .drawer-app[data-game="tag"]::before {
      background: linear-gradient(145deg, rgba(255, 217, 61, 0.1), transparent);
    }
    .drawer-app[data-game="coming"]::before {
      background: linear-gradient(145deg, rgba(124, 92, 252, 0.08), transparent);
    }
    .drawer-app:hover::before { opacity: 1; }

    .drawer-app-icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      position: relative;
      z-index: 1;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .drawer-app:hover .drawer-app-icon {
      transform: scale(1.1);
    }

    .drawer-app-icon.icon-soccer { background: linear-gradient(135deg, #ff6b6b, #ff4757); }
    .drawer-app-icon.icon-tag { background: linear-gradient(135deg, #ffd93d, #ffa502); }
    .drawer-app-icon.icon-coming { background: linear-gradient(135deg, rgba(124,92,252,0.4), rgba(78,205,196,0.3)); }

    .drawer-app-name {
      font-size: 0.8rem;
      font-weight: 500;
      position: relative;
      z-index: 1;
      text-align: center;
      line-height: 1.2;
    }
    .drawer-app-badge {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent-1);
      background: rgba(124, 92, 252, 0.12);
      padding: 0.15rem 0.5rem;
      border-radius: 100px;
      position: relative;
      z-index: 1;
    }

    .drawer-app.disabled {
      opacity: 0.4;
      cursor: default;
    }
    .drawer-app.disabled:hover {
      background: transparent;
      border-color: transparent;
    }
    .drawer-app.disabled:hover .drawer-app-icon {
      transform: none;
    }
    .drawer-app.disabled:active {
      transform: none;
    }

    /* Drawer footer */
    .drawer-footer {
      padding: 0.8rem 1.4rem;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .drawer-footer-text {
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--text-tertiary);
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .drawer-footer-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--accent-3);
    }

    /* ── Animations ────────────────────────────────────────── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    :focus-visible {
      outline: 2px solid var(--accent-1);
      outline-offset: 2px;
    }

    /* ── Responsive ────────────────────────────────────────── */
    @media (max-width: 600px) {
      .desktop { padding: 1.5rem; }
      .clock-time { font-size: 5rem; }
      .taskbar-left, .taskbar-right { display: none; }
      .taskbar { justify-content: center; }
      .drawer {
        width: calc(100vw - 1rem);
        bottom: 54px;
        border-radius: var(--radius-md) var(--radius-md) 0 0;
      }
      .drawer-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>

  <!-- Ambient background -->
  <div class="ambient">
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>
  </div>

  <!-- Stars -->
  <div class="stars-container" id="starsContainer"></div>

  <!-- Desktop area (clean — just the clock) -->
  <main class="desktop">
    <section class="clock-section" id="clockSection">
      <div class="clock-time" id="clockTime">00:00</div>
      <div class="clock-greeting" id="clockGreeting">Good evening</div>
      <div class="clock-date" id="clockDate">Monday, April 14</div>
    </section>
  </main>

  <!-- ── App Drawer overlay ─────────────────────────────── -->
  <div class="drawer-overlay" id="drawerOverlay"></div>

  <!-- ── App Drawer panel ───────────────────────────────── -->
  <div class="drawer" id="drawer">

    <!-- Search inside drawer -->
    <div class="drawer-search">
      <div class="drawer-search-bar">
        <input
          type="text"
          id="searchInput"
          placeholder="Search games, Google, or type a URL…"
          autocomplete="off"
          spellcheck="false"
        />
        <svg class="drawer-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </div>
    </div>

    <div class="drawer-label">All Games</div>

    <!-- Apps grid -->
    <div class="drawer-apps">
      <div class="drawer-grid" id="drawerGrid">

        <a href="soccer.html" class="drawer-app" data-game="soccer" id="appSoccer">
          <div class="drawer-app-icon icon-soccer">⚽</div>
          <div class="drawer-app-name">Soccer</div>
        </a>

        <a href="tag.html" class="drawer-app" data-game="tag" id="appTag">
          <div class="drawer-app-icon icon-tag">🏃</div>
          <div class="drawer-app-name">Tag</div>
        </a>

        <div class="drawer-app disabled" data-game="coming" id="appComing1">
          <div class="drawer-app-icon icon-coming">🧩</div>
          <div class="drawer-app-name">Puzzle</div>
          <div class="drawer-app-badge">Soon</div>
        </div>

        <div class="drawer-app disabled" data-game="coming" id="appComing2">
          <div class="drawer-app-icon icon-coming">🏎️</div>
          <div class="drawer-app-name">Racing</div>
          <div class="drawer-app-badge">Soon</div>
        </div>

        <div class="drawer-app disabled" data-game="coming" id="appComing3">
          <div class="drawer-app-icon icon-coming">🎯</div>
          <div class="drawer-app-name">Archery</div>
          <div class="drawer-app-badge">Soon</div>
        </div>

        <div class="drawer-app disabled" data-game="coming" id="appComing4">
          <div class="drawer-app-icon icon-coming">🪐</div>
          <div class="drawer-app-name">Space Run</div>
          <div class="drawer-app-badge">Soon</div>
        </div>

      </div>
    </div>

    <!-- Footer -->
    <div class="drawer-footer">
      <div class="drawer-footer-text">
        <span class="drawer-footer-dot"></span>
        2 games available
      </div>
      <div class="drawer-footer-text">Game Hub v1.0</div>
    </div>

  </div>

  <!-- ── Taskbar ────────────────────────────────────────── -->
  <nav class="taskbar" id="taskbar">

    <div class="taskbar-left">
      <button class="start-btn" id="startBtn" aria-label="Open app drawer">
        <svg viewBox="0 0 16 16" fill="currentColor">
          <rect x="1" y="1" width="6.5" height="6.5" rx="1.2"/>
          <rect x="8.5" y="1" width="6.5" height="6.5" rx="1.2"/>
          <rect x="1" y="8.5" width="6.5" height="6.5" rx="1.2"/>
          <rect x="8.5" y="8.5" width="6.5" height="6.5" rx="1.2"/>
        </svg>
        Game Hub
      </button>
    </div>

    <div class="taskbar-center">
      <a href="soccer.html" class="taskbar-icon pinned" id="iconSoccer" aria-label="Soccer game">
        <span class="icon-emoji">⚽</span>
        <span class="tooltip">Soccer</span>
      </a>
      <a href="tag.html" class="taskbar-icon pinned" id="iconTag" aria-label="Tag game">
        <span class="icon-emoji">🏃</span>
        <span class="tooltip">Tag</span>
      </a>
      <div class="taskbar-divider"></div>
      <div class="taskbar-icon" style="opacity: 0.35; cursor: default;" aria-label="More games coming soon">
        <span class="icon-emoji">🎮</span>
        <span class="tooltip">More coming soon…</span>
      </div>
    </div>

    <div class="taskbar-right">
      <div class="tray-item">
        <span class="tray-dot"></span>
        <span>Online</span>
      </div>
      <div class="tray-clock" id="trayClock">
        <div id="trayTime">7:25 PM</div>
        <div id="trayDate">4/14/2026</div>
      </div>
    </div>

  </nav>

  <script>
    // ── Elements ──────────────────────────────────────────
    const clockTimeEl    = document.getElementById('clockTime');
    const clockGreetingEl = document.getElementById('clockGreeting');
    const clockDateEl    = document.getElementById('clockDate');
    const trayTimeEl     = document.getElementById('trayTime');
    const trayDateEl     = document.getElementById('trayDate');
    const startBtn       = document.getElementById('startBtn');
    const drawer         = document.getElementById('drawer');
    const drawerOverlay  = document.getElementById('drawerOverlay');
    const searchInput    = document.getElementById('searchInput');
    const drawerGrid     = document.getElementById('drawerGrid');

    // ── Clock ────────────────────────────────────────────
    function updateClock() {
      const now = new Date();
      const hours = now.getHours();
      const mins = String(now.getMinutes()).padStart(2, '0');
      const h12 = hours % 12 || 12;
      const ampm = hours >= 12 ? 'PM' : 'AM';

      clockTimeEl.textContent = `${h12}:${mins}`;

      let greeting = 'Good evening';
      if (hours < 12) greeting = 'Good morning';
      else if (hours < 17) greeting = 'Good afternoon';
      clockGreetingEl.textContent = greeting;

      const opts = { weekday: 'long', month: 'long', day: 'numeric' };
      clockDateEl.textContent = now.toLocaleDateString('en-US', opts);

      trayTimeEl.textContent = `${h12}:${mins} ${ampm}`;
      trayDateEl.textContent = `${now.getMonth() + 1}/${now.getDate()}/${now.getFullYear()}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ── Drawer toggle ────────────────────────────────────
    let drawerOpen = false;

    function toggleDrawer() {
      drawerOpen = !drawerOpen;
      drawer.classList.toggle('open', drawerOpen);
      drawerOverlay.classList.toggle('open', drawerOpen);
      startBtn.classList.toggle('active', drawerOpen);

      if (drawerOpen) {
        // Focus search after animation
        setTimeout(() => searchInput.focus(), 150);
      } else {
        searchInput.value = '';
        filterApps('');
      }
    }

    function closeDrawer() {
      if (!drawerOpen) return;
      drawerOpen = false;
      drawer.classList.remove('open');
      drawerOverlay.classList.remove('open');
      startBtn.classList.remove('active');
      searchInput.value = '';
      filterApps('');
    }

    startBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleDrawer();
    });

    drawerOverlay.addEventListener('click', closeDrawer);

    // Close drawer on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeDrawer();
    });

    // ── Search inside drawer ─────────────────────────────
    searchInput.addEventListener('input', () => {
      filterApps(searchInput.value.trim().toLowerCase());
    });

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const q = searchInput.value.trim();
        if (!q) return;

        // Check if a visible game matches
        const visibleApps = drawerGrid.querySelectorAll('.drawer-app:not([style*="display: none"]):not(.disabled)');
        if (visibleApps.length === 1) {
          visibleApps[0].click();
          return;
        }

        // Otherwise search Google / navigate URL
        if (/^(https?:\/\/|[a-z0-9-]+\.[a-z]{2,})/i.test(q)) {
          const url = q.startsWith('http') ? q : 'https://' + q;
          window.location.href = url;
        } else {
          window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(q);
        }
      }
    });

    function filterApps(query) {
      const apps = drawerGrid.querySelectorAll('.drawer-app');
      apps.forEach(app => {
        const name = app.querySelector('.drawer-app-name').textContent.toLowerCase();
        const matches = !query || name.includes(query);
        app.style.display = matches ? '' : 'none';
      });
    }

    // ── Stars ────────────────────────────────────────────
    const starsContainer = document.getElementById('starsContainer');
    for (let i = 0; i < 55; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.top = Math.random() * 100 + '%';
      star.style.left = Math.random() * 100 + '%';
      star.style.setProperty('--delay', (Math.random() * 5) + 's');
      star.style.setProperty('--dur', (2.5 + Math.random() * 4) + 's');
      const size = (Math.random() > 0.8 ? 2.5 : 1.5) + 'px';
      star.style.width = size;
      star.style.height = size;
      starsContainer.appendChild(star);
    }

    // ── Open drawer on any keypress (when not already focused) ──
    document.addEventListener('keydown', (e) => {
      if (
        document.activeElement !== searchInput &&
        !e.ctrlKey && !e.metaKey && !e.altKey &&
        e.key.length === 1
      ) {
        if (!drawerOpen) toggleDrawer();
        // Let the character go into the search after it focuses
      }
    });
  </script>
</body>
</html>
