<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab — Game Hub</title>
  <meta name="description" content="Your personal new tab page with quick access to games and search." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --surface: rgba(255, 255, 255, 0.04);
      --surface-hover: rgba(255, 255, 255, 0.08);
      --surface-border: rgba(255, 255, 255, 0.06);
      --text-primary: #f0f0f5;
      --text-secondary: rgba(255, 255, 255, 0.5);
      --text-tertiary: rgba(255, 255, 255, 0.25);
      --accent-1: #7c5cfc;
      --accent-2: #ff6b9d;
      --accent-3: #4ecdc4;
      --accent-4: #ffd93d;
      --glow-purple: rgba(124, 92, 252, 0.15);
      --glow-pink: rgba(255, 107, 157, 0.15);
      --radius-sm: 12px;
      --radius-md: 18px;
      --radius-lg: 24px;
      --radius-xl: 32px;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* ── Ambient animated background ──────────────────────────── */
    .ambient {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .ambient-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.12;
      will-change: transform;
    }
    .ambient-orb.orb-1 {
      width: 600px; height: 600px;
      background: var(--accent-1);
      top: -200px; left: -100px;
      animation: orbFloat1 20s ease-in-out infinite alternate;
    }
    .ambient-orb.orb-2 {
      width: 500px; height: 500px;
      background: var(--accent-2);
      bottom: -200px; right: -100px;
      animation: orbFloat2 18s ease-in-out infinite alternate;
    }
    .ambient-orb.orb-3 {
      width: 350px; height: 350px;
      background: var(--accent-3);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: orbFloat3 22s ease-in-out infinite alternate;
      opacity: 0.07;
    }

    @keyframes orbFloat1 {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(80px, 60px) scale(1.15); }
    }
    @keyframes orbFloat2 {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-70px, -50px) scale(1.1); }
    }
    @keyframes orbFloat3 {
      0%   { transform: translate(-50%, -50%) scale(1); }
      100% { transform: translate(-40%, -60%) scale(1.2); }
    }

    /* Noise grain overlay */
    .ambient::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.4;
    }

    /* Stars */
    .stars-container {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .star {
      position: absolute;
      width: 1.5px; height: 1.5px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      animation: starTwinkle var(--dur) ease-in-out infinite;
      animation-delay: var(--delay);
    }
    @keyframes starTwinkle {
      0%, 100% { opacity: 0.15; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.4); }
    }

    /* ── Main content ─────────────────────────────────────────── */
    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 720px;
      padding: 2rem;
      gap: 2.5rem;
    }

    /* ── Clock ────────────────────────────────────────────────── */
    .clock-section {
      text-align: center;
      animation: fadeInUp 0.8s ease both;
    }
    .clock-time {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(4.5rem, 12vw, 8rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      background: linear-gradient(135deg, var(--text-primary) 0%, rgba(255,255,255,0.6) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .clock-greeting {
      font-size: 1.25rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-top: 0.5rem;
      letter-spacing: 0.01em;
    }
    .clock-date {
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--text-tertiary);
      margin-top: 0.4rem;
      letter-spacing: 0.04em;
    }

    /* ── Search bar ───────────────────────────────────────────── */
    .search-wrapper {
      width: 100%;
      animation: fadeInUp 0.8s 0.15s ease both;
    }
    .search-bar {
      position: relative;
      width: 100%;
    }
    .search-bar input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.5rem 1rem 3.2rem;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      color: var(--text-primary);
      outline: none;
      transition: all 0.3s ease;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .search-bar input::placeholder {
      color: var(--text-tertiary);
      font-weight: 400;
    }
    .search-bar input:focus {
      border-color: rgba(124, 92, 252, 0.4);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 0 4px rgba(124, 92, 252, 0.08),
                  0 8px 32px rgba(0, 0, 0, 0.3);
    }
    .search-icon {
      position: absolute;
      left: 1.1rem;
      top: 50%;
      transform: translateY(-50%);
      width: 18px; height: 18px;
      color: var(--text-tertiary);
      transition: color 0.3s ease;
      pointer-events: none;
    }
    .search-bar input:focus ~ .search-icon {
      color: var(--accent-1);
    }

    /* ── Quick links grid ─────────────────────────────────────── */
    .shortcuts-section {
      width: 100%;
      animation: fadeInUp 0.8s 0.3s ease both;
    }
    .shortcuts-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 1rem;
      padding-left: 0.2rem;
    }
    .shortcuts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.8rem;
    }

    .shortcut-card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 1.6rem 1rem;
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-md);
      text-decoration: none;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      overflow: hidden;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .shortcut-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 0;
    }
    .shortcut-card.card-soccer::before {
      background: linear-gradient(145deg, rgba(255, 107, 107, 0.12), rgba(255, 71, 87, 0.06));
    }
    .shortcut-card.card-tag::before {
      background: linear-gradient(145deg, rgba(255, 217, 61, 0.12), rgba(255, 165, 2, 0.06));
    }
    .shortcut-card.card-more::before {
      background: linear-gradient(145deg, rgba(124, 92, 252, 0.12), rgba(78, 205, 196, 0.06));
    }

    .shortcut-card:hover::before { opacity: 1; }
    .shortcut-card:hover {
      border-color: rgba(255, 255, 255, 0.12);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
    }
    .shortcut-card:active {
      transform: translateY(-1px) scale(0.98);
    }

    .shortcut-emoji {
      font-size: 2.4rem;
      line-height: 1;
      position: relative;
      z-index: 1;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .shortcut-card:hover .shortcut-emoji {
      transform: scale(1.15) rotate(-4deg);
    }

    .shortcut-info {
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .shortcut-name {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: 0.01em;
    }
    .shortcut-desc {
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--text-tertiary);
      margin-top: 0.2rem;
      line-height: 1.3;
    }

    /* Glow ring on hover */
    .shortcut-card.card-soccer:hover {
      box-shadow: 0 12px 40px rgba(255, 107, 107, 0.12);
    }
    .shortcut-card.card-tag:hover {
      box-shadow: 0 12px 40px rgba(255, 217, 61, 0.12);
    }
    .shortcut-card.card-more:hover {
      box-shadow: 0 12px 40px rgba(124, 92, 252, 0.12);
    }

    /* ── Bottom status bar ────────────────────────────────────── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      animation: fadeInUp 0.8s 0.45s ease both;
    }
    .status-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-tertiary);
      letter-spacing: 0.03em;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent-3);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    .status-divider {
      width: 1px; height: 12px;
      background: rgba(255, 255, 255, 0.08);
    }

    /* ── Animations ───────────────────────────────────────────── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Focus visible ────────────────────────────────────────── */
    :focus-visible {
      outline: 2px solid var(--accent-1);
      outline-offset: 2px;
    }

    /* ── Responsive ───────────────────────────────────────────── */
    @media (max-width: 480px) {
      .page { padding: 1.5rem; gap: 2rem; }
      .clock-time { font-size: 3.5rem; }
      .shortcuts-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <!-- Ambient background -->
  <div class="ambient">
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>
  </div>

  <!-- Stars -->
  <div class="stars-container" id="starsContainer"></div>

  <!-- Page content -->
  <div class="page">

    <!-- Clock & Greeting -->
    <section class="clock-section" id="clockSection">
      <div class="clock-time" id="clockTime">00:00</div>
      <div class="clock-greeting" id="clockGreeting">Good evening</div>
      <div class="clock-date" id="clockDate">Sunday, April 13</div>
    </section>

    <!-- Search -->
    <div class="search-wrapper">
      <div class="search-bar">
        <input
          type="text"
          id="searchInput"
          placeholder="Search Google or type a URL"
          autocomplete="off"
          spellcheck="false"
        />
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </div>
    </div>

    <!-- Quick-link shortcuts -->
    <section class="shortcuts-section">
      <div class="shortcuts-label">Quick Links</div>
      <div class="shortcuts-grid">

        <a href="soccer.html" class="shortcut-card card-soccer" id="shortcutSoccer">
          <div class="shortcut-emoji">⚽</div>
          <div class="shortcut-info">
            <div class="shortcut-name">Soccer</div>
            <div class="shortcut-desc">Score goals & win</div>
          </div>
        </a>

        <a href="tag.html" class="shortcut-card card-tag" id="shortcutTag">
          <div class="shortcut-emoji">🏃</div>
          <div class="shortcut-info">
            <div class="shortcut-name">Tag</div>
            <div class="shortcut-desc">Chase & dodge</div>
          </div>
        </a>

        <div class="shortcut-card card-more" id="shortcutMore" style="cursor: default; opacity: 0.5;">
          <div class="shortcut-emoji">🎮</div>
          <div class="shortcut-info">
            <div class="shortcut-name">More Soon</div>
            <div class="shortcut-desc">Coming soon…</div>
          </div>
        </div>

      </div>
    </section>

    <!-- Status bar -->
    <div class="status-bar">
      <div class="status-item">
        <span class="status-dot"></span>
        <span>Game Hub Online</span>
      </div>
      <div class="status-divider"></div>
      <div class="status-item" id="gameCount">2 Games Available</div>
    </div>

  </div>

  <script>
    // ── Clock ──────────────────────────────────────────────
    const clockTimeEl = document.getElementById('clockTime');
    const clockGreetingEl = document.getElementById('clockGreeting');
    const clockDateEl = document.getElementById('clockDate');

    function updateClock() {
      const now = new Date();
      const hours = now.getHours();
      const mins = String(now.getMinutes()).padStart(2, '0');

      // 12-hour format
      const h12 = hours % 12 || 12;
      clockTimeEl.textContent = `${h12}:${mins}`;

      // Greeting
      let greeting = 'Good evening';
      if (hours < 12) greeting = 'Good morning';
      else if (hours < 17) greeting = 'Good afternoon';
      clockGreetingEl.textContent = greeting;

      // Date
      const opts = { weekday: 'long', month: 'long', day: 'numeric' };
      clockDateEl.textContent = now.toLocaleDateString('en-US', opts);
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ── Search ─────────────────────────────────────────────
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const q = searchInput.value.trim();
        if (!q) return;
        // If it looks like a URL, navigate directly
        if (/^(https?:\/\/|[a-z0-9-]+\.[a-z]{2,})/i.test(q)) {
          const url = q.startsWith('http') ? q : 'https://' + q;
          window.location.href = url;
        } else {
          window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(q);
        }
      }
    });

    // ── Stars ──────────────────────────────────────────────
    const starsContainer = document.getElementById('starsContainer');
    for (let i = 0; i < 60; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.top = Math.random() * 100 + '%';
      star.style.left = Math.random() * 100 + '%';
      star.style.setProperty('--delay', (Math.random() * 4) + 's');
      star.style.setProperty('--dur', (2 + Math.random() * 4) + 's');
      const size = (Math.random() > 0.8 ? 2.5 : 1.5) + 'px';
      star.style.width = size;
      star.style.height = size;
      starsContainer.appendChild(star);
    }

    // ── Auto-focus search on key press ─────────────────────
    document.addEventListener('keydown', (e) => {
      if (
        document.activeElement !== searchInput &&
        !e.ctrlKey && !e.metaKey && !e.altKey &&
        e.key.length === 1
      ) {
        searchInput.focus();
      }
    });
  </script>
</body>
</html>
