<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0e17;
      --card1: #ff6b6b;
      --card1-dark: #c0392b;
      --card2: #ffd93d;
      --card2-dark: #e5a800;
      --text: #fffffe;
      --glow1: rgba(255,107,107,0.5);
      --glow2: rgba(255,217,61,0.5);
    }

    body {
      background-color: var(--bg);
      font-family: 'Nunito', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
      position: relative;
    }

    /* Animated background blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.18;
      animation: drift 12s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }
    .blob1 { width: 500px; height: 500px; background: var(--card1); top: -150px; left: -150px; animation-duration: 14s; }
    .blob2 { width: 400px; height: 400px; background: var(--card2); bottom: -120px; right: -120px; animation-duration: 10s; animation-delay: -4s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.1); }
    }

    /* Stars */
    .stars {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }
    .star {
      position: absolute;
      width: 2px; height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }

    /* Content */
    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 860px;
      width: 100%;
    }

    .title-badge {
      display: inline-block;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 100px;
      padding: 0.3rem 1.2rem;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      margin-bottom: 1rem;
      animation: fadeDown 0.6s ease both;
    }

    h1 {
      font-family: 'Boogaloo', cursive;
      font-size: clamp(3rem, 9vw, 6rem);
      line-height: 1;
      letter-spacing: -0.01em;
      animation: fadeDown 0.7s 0.1s ease both;
      margin-bottom: 0.5rem;
    }
    h1 span { color: var(--card1); }

    .subtitle {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.45);
      font-weight: 700;
      margin-bottom: 3.5rem;
      animation: fadeDown 0.7s 0.2s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Cards grid */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 2rem;
      width: 100%;
    }

    .card {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      display: block;
      animation: fadeUp 0.7s ease both;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.25s ease;
    }
    .card:nth-child(1) { animation-delay: 0.3s; }
    .card:nth-child(2) { animation-delay: 0.45s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:hover {
      transform: translateY(-10px) scale(1.02);
    }
    .card:active { transform: scale(0.97); }

    .card-inner {
      padding: 2.8rem 2rem 2.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      position: relative;
    }

    /* Card 1 — Soccer */
    .card-soccer { background: linear-gradient(145deg, var(--card1), #ff4757); }
    .card-soccer:hover { box-shadow: 0 30px 70px var(--glow1); }

    /* Card 2 — Tag */
    .card-tag { background: linear-gradient(145deg, var(--card2), #ffa502); }
    .card-tag:hover { box-shadow: 0 30px 70px var(--glow2); }

    .card-emoji {
      font-size: 5rem;
      line-height: 1;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,0.3));
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .card:hover .card-emoji { transform: scale(1.2) rotate(-6deg); }

    .card-title {
      font-family: 'Boogaloo', cursive;
      font-size: 2.4rem;
      color: #fff;
      text-shadow: 0 2px 12px rgba(0,0,0,0.25);
      letter-spacing: 0.01em;
    }

    .card-desc {
      font-size: 0.95rem;
      font-weight: 700;
      color: rgba(255,255,255,0.75);
      text-align: center;
      line-height: 1.5;
    }

    .card-btn {
      margin-top: 0.8rem;
      background: rgba(255,255,255,0.22);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 100px;
      padding: 0.6rem 2rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 0.95rem;
      color: #fff;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: background 0.2s, border-color 0.2s;
    }
    .card:hover .card-btn {
      background: rgba(255,255,255,0.35);
      border-color: rgba(255,255,255,0.7);
    }

    /* Decorative corner shape */
    .card::after {
      content: '';
      position: absolute;
      bottom: -30px; right: -30px;
      width: 120px; height: 120px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
    }
    .card::before {
      content: '';
      position: absolute;
      top: -20px; left: -20px;
      width: 80px; height: 80px;
      background: rgba(255,255,255,0.06);
      border-radius: 50%;
    }

    .footer {
      margin-top: 3rem;
      color: rgba(255,255,255,0.2);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      animation: fadeUp 0.7s 0.6s ease both;
    }
  </style>
</head>
<body>

  <!-- Background blobs -->
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <!-- Stars -->
  <div class="stars" id="stars"></div>

  <div class="content">
    <div class="title-badge">🎮 Game Hub</div>
    <h1>Pick Your <span>Game</span></h1>
    <p class="subtitle">Choose a game below and start playing!</p>

    <div class="cards">
      <!-- Soccer -->
      <a href="soccer.html" class="card card-soccer">
        <div class="card-inner">
          <div class="card-emoji">⚽</div>
          <div class="card-title">Soccer</div>
          <div class="card-desc">Score goals and beat the keeper in this fast-paced football game.</div>
          <div class="card-btn">Play Now →</div>
        </div>
      </a>

      <!-- Tag -->
      <a href="tag.html" class="card card-tag">
        <div class="card-inner">
          <div class="card-emoji">🏃</div>
          <div class="card-title">Tag</div>
          <div class="card-desc">Run, dodge, and chase your friends in the classic game of tag.</div>
          <div class="card-btn">Play Now →</div>
        </div>
      </a>
    </div>

    <p class="footer">More games coming soon</p>
  </div>

  <script>
    // Generate random stars
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.top = Math.random() * 100 + '%';
      star.style.left = Math.random() * 100 + '%';
      star.style.animationDelay = (Math.random() * 3) + 's';
      star.style.animationDuration = (2 + Math.random() * 3) + 's';
      star.style.width = star.style.height = (Math.random() > 0.7 ? 3 : 2) + 'px';
      starsEl.appendChild(star);
    }
  </script>
</body>
</html>
